<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
  <style>
    .envelope{animation:env-bob 1s ease-in-out infinite alternate;transform-origin:24px 26px}
    @keyframes env-bob{from{transform:translateY(0)}to{transform:translateY(-2px)}}
    .flap{animation:flap-open 1s ease-in-out infinite alternate;transform-origin:24px 18px}
    @keyframes flap-open{from{transform:rotate(0deg)}to{transform:rotate(-12deg)}}
    .letter{animation:letter-peek 1s ease-in-out infinite alternate}
    @keyframes letter-peek{from{transform:translateY(0)}to{transform:translateY(-4px)}}
    .dot{animation:dot-pulse 0.75s ease-in-out infinite alternate}
    @keyframes dot-pulse{from{opacity:1}to{opacity:0.5}}
  </style>
  <g class="envelope">
    <g class="letter">
      <rect x="14" y="14" width="20" height="16" rx="2" fill="#fde68a"/>
      <rect x="17" y="17" width="14" height="2" rx="1" fill="#d97706" opacity="0.4"/>
      <rect x="17" y="21" width="10" height="2" rx="1" fill="#d97706" opacity="0.3"/>
    </g>
    <rect x="8" y="18" width="32" height="22" rx="3" fill="#7c3aed"/>
    <rect x="9" y="19" width="30" height="20" rx="2" fill="#5b21b6"/>
    <path d="M9 19l15 11 15-11" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <g class="flap">
      <path d="M8 18l16 12 16-12" fill="#8b5cf6" stroke="#9333ea" stroke-width="0.5"/>
    </g>
  </g>
  <circle class="dot" cx="38" cy="12" r="5" fill="#fbbf24"/>
  <circle cx="38" cy="12" r="3" fill="#fde68a"/>
</svg>
