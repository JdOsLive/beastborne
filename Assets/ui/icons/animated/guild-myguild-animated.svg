<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
  <style>
    .banner{animation:banner-wave 1.2s ease-in-out infinite alternate;transform-origin:24px 8px}
    @keyframes banner-wave{from{transform:translateY(0)}to{transform:translateY(-1.5px)}}
    .crown-shine{animation:crown-gl 1.2s ease-in-out infinite alternate}
    @keyframes crown-gl{from{opacity:0.8}to{opacity:0.4}}
    .people{animation:people-bob 1s ease-in-out infinite alternate}
    @keyframes people-bob{from{transform:translateY(0)}to{transform:translateY(-1px)}}
    .glow{animation:flag-glow 1.2s ease-in-out infinite alternate}
    @keyframes flag-glow{from{opacity:0.15}to{opacity:0.35}}
  </style>
  <ellipse class="glow" cx="24" cy="26" rx="16" ry="14" fill="#c084fc" opacity="0.15"/>
  <rect x="23" y="4" width="2" height="32" rx="1" fill="#a0a0b0"/>
  <g class="banner">
    <path d="M25 6h14v14l-3-2-3 2-3-2-3 2-2-2V6Z" fill="#7c3aed"/>
    <path d="M25 6h14v14l-3-2-3 2-3-2-3 2-2-2V6Z" fill="none" stroke="#9333ea" stroke-width="0.5"/>
    <path d="M29 10l1-2 2 1.5 2-1.5 1 2v3h-6Z" fill="#fbbf24"/>
    <path class="crown-shine" d="M30 10l1-2 2 1.5 1.5-1v5h-4.5Z" fill="#fde68a" opacity="0.8"/>
  </g>
  <g class="people">
    <circle cx="14" cy="32" r="3.5" fill="#a78bfa"/>
    <rect x="10.5" y="36" width="7" height="8" rx="3" fill="#a78bfa"/>
    <circle cx="24" cy="30" r="4" fill="#c084fc"/>
    <rect x="20" y="34.5" width="8" height="9" rx="3.5" fill="#c084fc"/>
    <circle cx="34" cy="32" r="3.5" fill="#a78bfa"/>
    <rect x="30.5" y="36" width="7" height="8" rx="3" fill="#a78bfa"/>
  </g>
</svg>
