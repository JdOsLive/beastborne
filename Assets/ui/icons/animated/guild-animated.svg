<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
  <style>
    .shield{animation:shield-bob 1.2s ease-in-out infinite alternate;transform-origin:24px 24px}
    @keyframes shield-bob{from{transform:translateY(0)}to{transform:translateY(-1.5px)}}
    .sw-l{animation:sw-rock-l 1.2s ease-in-out infinite alternate;transform-origin:24px 24px}
    .sw-r{animation:sw-rock-r 1.2s ease-in-out infinite alternate;transform-origin:24px 24px}
    @keyframes sw-rock-l{from{transform:rotate(-25deg)}to{transform:rotate(-32deg)}}
    @keyframes sw-rock-r{from{transform:rotate(25deg)}to{transform:rotate(32deg)}}
    .shine{animation:gl 1.2s ease-in-out infinite alternate}
    @keyframes gl{from{opacity:0.9}to{opacity:0.4}}
    .glow{animation:shield-glow 1.2s ease-in-out infinite alternate}
    @keyframes shield-glow{from{opacity:0.2}to{opacity:0.5}}
  </style>
  <ellipse class="glow" cx="24" cy="28" rx="16" ry="14" fill="#a855f7" opacity="0.2"/>
  <g class="sw-l">
    <rect x="22" y="30" width="4" height="7" rx="1" fill="#7c3aed"/>
    <rect x="18.5" y="27.5" width="11" height="3" rx="1" fill="#fbbf24"/>
    <path d="M22 27.5V14L24 9l2 5V27.5Z" fill="#d1d5db"/>
    <path class="shine" d="M24 9v18.5h2V14Z" fill="#ffffff" opacity="0.9"/>
  </g>
  <g class="sw-r">
    <rect x="22" y="30" width="4" height="7" rx="1" fill="#7c3aed"/>
    <rect x="18.5" y="27.5" width="11" height="3" rx="1" fill="#fbbf24"/>
    <path d="M22 27.5V14L24 9l2 5V27.5Z" fill="#d1d5db"/>
    <path class="shine" d="M24 9v18.5h2V14Z" fill="#ffffff" opacity="0.9"/>
  </g>
  <g class="shield">
    <path d="M24 4C16 4 9 8 9 8v16c0 10 15 20 15 20s15-10 15-20V8S32 4 24 4Z" fill="#1a0a2e" stroke="#a855f7" stroke-width="2"/>
    <path d="M24 8C18 8 13 10.5 13 10.5v13c0 8 11 15 11 15s11-7 11-15v-13S30 8 24 8Z" fill="#2d1b4e"/>
    <path d="M24 14l2 4.5 5 .7-3.5 3.5.7 5L24 25.5l-4.2 2.2.7-5L17 19.2l5-.7Z" fill="#fbbf24"/>
    <path class="shine" d="M24 14l2 4.5 5 .7-3.5 3.5.7 5L24 25.5Z" fill="#fde68a" opacity="0.9"/>
  </g>
</svg>
