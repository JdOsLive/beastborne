<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="128" height="128">
  <style>
    .glass{animation:glass-scan 1.2s ease-in-out infinite alternate;transform-origin:24px 24px}
    @keyframes glass-scan{from{transform:translateX(0) translateY(0)}to{transform:translateX(2px) translateY(-1px)}}
    .lens-shine{animation:shine-pulse 1.2s ease-in-out infinite alternate}
    @keyframes shine-pulse{from{opacity:0.6}to{opacity:0.2}}
    .sparkle{animation:sparkle-fade 0.9s ease-in-out infinite alternate}
    @keyframes sparkle-fade{from{opacity:0}to{opacity:1}}
    .sparkle2{animation:sparkle-fade 0.9s ease-in-out 0.3s infinite alternate}
    .sparkle3{animation:sparkle-fade 0.9s ease-in-out 0.6s infinite alternate}
  </style>
  <g class="glass">
    <rect x="30" y="32" width="4" height="10" rx="2" fill="#7c3aed" transform="rotate(-45 32 37)"/>
    <circle cx="22" cy="22" r="13" fill="none" stroke="#a855f7" stroke-width="3"/>
    <circle cx="22" cy="22" r="11" fill="rgba(139, 92, 246, 0.15)"/>
    <path class="lens-shine" d="M15 16a9 9 0 0 1 8-4" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <rect x="16" y="18" width="12" height="1.5" rx="0.5" fill="#c084fc" opacity="0.3"/>
    <rect x="16" y="22" width="9" height="1.5" rx="0.5" fill="#c084fc" opacity="0.3"/>
    <rect x="16" y="26" width="11" height="1.5" rx="0.5" fill="#c084fc" opacity="0.3"/>
  </g>
  <circle class="sparkle" cx="38" cy="10" r="1.5" fill="#fbbf24"/>
  <circle class="sparkle2" cx="8" cy="14" r="1" fill="#60a5fa"/>
  <circle class="sparkle3" cx="35" cy="28" r="1.2" fill="#c084fc"/>
</svg>
